<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>予算コード検索ツール</title>
    <style>
        :root {
            --primary: #0078d4;
            --yusan: #f97316;   /* 予算＝オレンジ */
            --bg-color: #f3f2f1;
            --panel-bg: #ffffff;
        }

        /* 全体枠：情報が一行で美しく整頓されるよう、最大幅を1050pxに設定 */
        .quest-container {
            font-family: "Segoe UI", "Meiryo", sans-serif;
            background: var(--bg-color);
            padding: 24px;
            border-radius: 12px;
            max-width: 1050px;
            box-sizing: border-box;
            border: 1px solid #e1dfdd;
            margin: 0 auto;
        }

        /* 🏢 検索窓セクション */
        .search-area {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 24px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .search-label {
            font-size: 15px;
            color: #323130;
            font-weight: bold;
        }

        /* 入力しやすい大サイズ入力欄 */
        .search-input {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 2px solid #a19f9d;
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.15s;
        }
        .search-input:focus {
            border-color: var(--primary);
        }

        /* 📋 検索結果テーブルセクション */
        .result-section {
            background: var(--panel-bg);
            border-radius: 8px;
            padding: 18px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            overflow-x: auto;
        }
        
        .result-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 3px solid var(--primary);
        }

        .result-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 16px;
        }
        .result-table th {
            background: #f3f2f1;
            text-align: left;
            padding: 12px 10px;
            font-size: 13px;
            color: #605e5c;
            border-bottom: 2px solid #e1dfdd;
            white-space: nowrap;
        }
        .result-table td {
            padding: 14px 10px;
            border-bottom: 1px solid #f3f2f1;
            vertical-align: middle;
            white-space: nowrap; /* 文字が絶対に二行にならないように固定 */
        }

        /* ホバー時の手応え演出 */
        .result-table tbody tr {
            transition: background-color 0.1s;
        }
        .result-table tbody tr:hover {
            background-color: #f5f7fa;
        }

        /* 属性オーラによる識別 */
        .badge-container {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .code-text {
            font-family: "Consolas", monospace;
            font-weight: bold;
            font-size: 16px;
            color: #000000;
            background: #f3f2f1;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px dashed #a19f9d;
            display: inline-block;
        }
        
        .type-badge {
            font-size: 11px;
            padding: 3px 6px;
            border-radius: 4px;
            color: white;
            margin-right: 4px;
            font-weight: bold;
            display: inline-block;
        }
        .badge-yusan { background: var(--yusan); }

        /* コピーボタンの装飾 */
        .btn-copy {
            padding: 6px 12px;
            font-size: 12px;
            border: 1px solid #a19f9d;
            border-radius: 4px;
            background: #ffffff;
            cursor: pointer;
            white-space: nowrap;
            font-weight: bold;
            color: #323130;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .btn-copy:hover {
            background: #f3f2f1;
            border-color: var(--primary);
            color: var(--primary);
        }

        /* コピー通知トースト */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: bold;
            display: none;
            z-index: 1000;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            white-space: nowrap;
        }
    </style>
</head>

<div class="quest-container">

    const searchDept = document.getElementById('searchDept');
    const resultBody = document.getElementById('resultBody');
    const toast = document.getElementById('toast');
    let masterData = [];

    // ⚙️ 起動時に生CSVテキストを安全にパースする内部エンジン
    function initMasterData() {
        const lines = rawCsvText.split(/\r\n|\n/);
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i]) continue;
            const commaIdx = lines[i].indexOf(',');
            if (commaIdx === -1) continue;
            
            const code = lines[i].substring(0, commaIdx).trim();
            const name = lines[i].substring(commaIdx + 1).trim();
            
            if (code && name) {
                masterData.push({ code: code, name: name });
            }
        }
    }

    // 🔍 複数キーワード対応（全角半角スペース）高速絞り込みロジック
    function filterAndRenderTable() {
        resultBody.innerHTML = '';
        const deptWds = searchDept.value.toLowerCase().split(/[\s ]+/);

        const filtered = masterData.filter(item => {
            const targetText = (item.code + item.name).toLowerCase();
            return deptWds.every(kw => !kw || targetText.includes(kw));
        });

        if (filtered.length === 0) {
            resultBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#605e5c; padding:30px; font-size:15px;">条件に合う所属が見つかりません。</td></tr>';
            return;
        }

        filtered.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <div class="badge-container">
                        <span class="type-badge badge-yusan">予算</span>
                        <span class="code-text">${item.code}</span>
                    </div>
                </td>
                <td>
                    <button class="btn-copy" onclick="copyValue('${item.code}', '予算コード')">📋 コードをコピー</button>
                </td>
                <td>
                    <span style="font-weight:bold; color:#323130;">${item.name}</span>
                </td>
                <td>
                    <button class="btn-copy" onclick="copyValue('${item.name}', '予算部署名')">📋 部署名をコピー</button>
                </td>
            `;
            resultBody.appendChild(tr);
        });
    }

    function copyValue(value, type) {
        navigator.clipboard.writeText(value).then(() => {
            showToast(`📋 ${type} 「${value}」 をコピーしました！`);
        });
    }

    function showToast(msg) {
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 1500);
    }

    searchDept.addEventListener('input', filterAndRenderTable);

    // 起動
    initMasterData();
    filterAndRenderTable();
</script>
